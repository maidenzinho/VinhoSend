<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VinhoSend — Criar Conta</title>
  <meta name="description" content="Crie sua conta no VinhoSend.">
  <meta name="author" content="VinhoSend">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="registro">
  <div class="site-shell">
    <nav class="navbar">
      <a href="index.html" class="brand" aria-label="VinhoSend">
        <img src="assets/logo-taca-branca.svg" alt="Logo VinhoSend" class="brand-logo">
        <span class="brand-text">VinhoSend</span>
      </a>

      <div class="nav-actions">
        <a href="login.html" class="pill-btn pill-secondary">Entrar</a>
        <a href="registro.html" class="pill-btn pill-secondary is-active">Criar Conta</a>
        <button type="button" id="themeToggle" class="theme-toggle" aria-label="Alternar tema">
          <i class="bi bi-moon-stars-fill icon-moon"></i>
          <i class="bi bi-sun-fill icon-sun"></i>
        </button>
      </div>
    </nav>

    <main class="auth-main">
      <section class="auth-card fade-in-up">
        <h1>Crie sua conta</h1>
        <p>Junte-se à comunidade VinhoSend.</p>

        <form id="authForm" class="auth-form">
          <div class="form-group">
            <label for="name">Nome completo</label>
            <input id="name" name="name" type="text" placeholder="Seu nome" required>
          </div>

          <div class="form-group">
            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" placeholder="seu@email.com" required>
          </div>

          <div class="form-group">
            <label for="password">Senha</label>
            <div class="password-wrap">
              <input id="password" name="password" type="password" placeholder="••••••••" required>
              <button type="button" id="togglePassword" class="password-toggle" aria-label="Mostrar ou ocultar senha">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirmar senha</label>
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="••••••••" required>
          </div>

          <button type="submit" class="pill-btn pill-primary submit-btn">Criar Conta</button>
        </form>

        <p class="auth-switch">
          Já tem uma conta?
          <a href="login.html" class="text-link">Entrar</a>
        </p>
      </section>
    </main>

    <footer class="footer-auth">
      © 2026 VinhoSend. Conectando pessoas, compartilhando histórias.
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
